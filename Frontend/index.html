<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/doormeets-logo.png" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: http: https: http://localhost:* http://127.0.0.1:* http://localhost:5000 http://127.0.0.1:5000 https://*.tile.openstreetmap.org https://cdnjs.cloudflare.com; font-src 'self' data: https:; connect-src 'self' data: blob: https: ws: wss: http://localhost:* http://127.0.0.1:* http://localhost:5000 http://127.0.0.1:5000 https://nominatim.openstreetmap.org; frame-src 'self' https:; object-src 'none'; base-uri 'self'; form-action 'self'; media-src 'self' https: blob: data:;">
  <meta name="description" content="Doormeets - Your Door. Our Service. The all-in-one home service platform for professional repairs, cleaning, and maintenance." />
  <title>Doormeets</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    (function() {
      try {
        var path = window.location.pathname;
        var isVendorOrWorker = path.indexOf('/vendor') === 0 || path.indexOf('/worker') === 0;
        if (!isVendorOrWorker) {
          var theme = localStorage.getItem('theme') || 'light';
          if (theme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.documentElement.classList.add('dark');
          }
        }
      } catch (e) {}
    })();
  </script>
  <!-- Theme-responsive base styles -->
  <style>
    :root {
      --html-bg-color: #ffffff;
      --html-bg: linear-gradient(to bottom, rgba(0, 166, 166, 0.03) 0%, rgba(41, 173, 129, 0.02) 10%, #ffffff 20%);
    }
    [data-theme="dark"] {
      --html-bg-color: #0A0911;
      --html-bg: #0A0911;
    }
  </style>
</head>

<body
  style="background-color: var(--html-bg-color); background: var(--html-bg); margin: 0; padding: 0;">
  <div id="root"
    style="background-color: var(--html-bg-color); background: var(--html-bg); min-height: 100dvh;">
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
